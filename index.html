<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クールジャポンカフェ（日研咖啡所）</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="home-page" class="head-p">
    <div class="overlay">
        <h1>日研咖啡所</h1>
        <p class="sub-title">クールジャパンカフェ</p>
        <div class="main-btns">
            <button onclick="showPage('table-page')">開始點餐</button>
            <button onclick="window.location.href='https://www.instagram.com/cysh_lovenihonn'">官方instagram</button>
        </div>
    </div>
</div>

<div id="table-page" style="display:none" class="container">

    <div class="header">
        <button class="icon-btn" onclick="showPage('home-page')">🏠</button>
    </div>

    <div class="table-selector" style="margin-bottom: 20px;">
        <label for="table-num" style="font-weight: bold; display: block; margin-bottom: 5px;">請選擇桌號：</label>
        <select id="table-num" style="width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 8px; border: 1px solid #ddd;">
            <option value="1">雷姆桌</option>
            <option value="2">白上桌</option>
            <option value="3">黑川桌</option>
            <option value="4">有馬桌</option>
            <option value="5">MEN桌</option>
            <option value="6">六飧桌</option>
        </select>
        <button class="checkout-btn" onclick="showPage('menu-page')">完成選擇</button>
    </div>
</div>

<div id="menu-page" style="display:none;" class="container">
    <div class="header">
        <button class="icon-btn" onclick="showPage('home-page')">🏠</button>
        <button class="cart-btn" onclick="showPage('cart-page')">🛒 購物車 (<span id="cart-count">0</span>)</button>
    </div>

    <h2>菜單</h2>
    <p class="sub-title1">メニュー</p>

    <div class="menu-category">
        <h3>刨冰</h3>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">抹茶</span>
                <span class="item-price">$70</span>
            </div>
            <div class="quantity-picker">
                <button onclick="changeMenuQty('qty-machaice', -1)">-</button>
                <input type="number" id="qty-machaice" value="1" min="1" readonly>
                <button onclick="changeMenuQty('qty-machaice', 1)">+</button>
                <button class="add-to-cart-btn" onclick="addToCart('抹茶刨冰', 70, 'qty-machaice')">加入</button>
            </div>
        </div>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">彈珠汽水</span>
                <span class="item-price">$70</span>
            </div>
            <div class="quantity-picker">
                <button onclick="changeMenuQty('qty-sodaice', -1)">-</button>
                <input type="number" id="qty-sodaice" value="1" min="1" readonly>
                <button onclick="changeMenuQty('qty-sodaice', 1)">+</button>
                <button class="add-to-cart-btn" onclick="addToCart('彈珠汽水刨冰', 70, 'qty-sodaice')">加入</button>
            </div>
        </div>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">桃子</span>
                <span class="item-price">$70</span>
            </div>
            <div class="quantity-picker">
                <button onclick="changeMenuQty('qty-momoice', -1)">-</button>
                <input type="number" id="qty-momoice" value="1" min="1" readonly>
                <button onclick="changeMenuQty('qty-momoice', 1)">+</button>
                <button class="add-to-cart-btn" onclick="addToCart('桃子刨冰', 70, 'qty-momoice')">加入</button>
            </div>
        </div>
    </div>

    <div class="menu-category">
        <h3>果凍</h3>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">宇治茶</span>
                <span class="item-price">$60</span>
            </div>
            <div class="quantity-picker">
                <button onclick="changeMenuQty('qty-ujitea', -1)">-</button>
                <input type="number" id="qty-ujitea" value="1" min="1" readonly>
                <button onclick="changeMenuQty('qty-ujitea', 1)">+</button>
                <button class="add-to-cart-btn" onclick="addToCart('宇治茶果凍', 60, 'qty-ujitea')">加入</button>
            </div>
        </div>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">抹茶</span>
                <span class="item-price">$60</span>
            </div>
            <div class="quantity-picker">
                <button onclick="changeMenuQty('qty-macha', -1)">-</button>
                <input type="number" id="qty-macha" value="1" min="1" readonly>
                <button onclick="changeMenuQty('qty-macha', 1)">+</button>
                <button class="add-to-cart-btn" onclick="addToCart('抹茶果凍', 60, 'qty-macha')">加入</button>
            </div>
        </div>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">桃子</span>
                <span class="item-price">$60</span>
            </div>
            <div class="quantity-picker">
                <button onclick="changeMenuQty('qty-momo', -1)">-</button>
                <input type="number" id="qty-momo" value="1" min="1" readonly>
                <button onclick="changeMenuQty('qty-momo', 1)">+</button>
                <button class="add-to-cart-btn" onclick="addToCart('桃子果凍', 60, 'qty-momo')">加入</button>
            </div>
        </div>
    </div>

    <div class="menu-category">
        <h3>飲料</h3>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">哈密瓜汽水</span>
                <span class="item-price">$60</span>
            </div>
            <div class="quantity-picker">
                <button onclick="changeMenuQty('qty-melonsoda', -1)">-</button>
                <input type="number" id="qty-melonsoda" value="1" min="1" readonly>
                <button onclick="changeMenuQty('qty-melonsoda', 1)">+</button>
                <button class="add-to-cart-btn" onclick="addToCart('哈密瓜汽水', 60, 'qty-melonsoda')">加入</button>
            </div>
        </div>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">可爾必思汽水</span>
                <span class="item-price">$50</span>
            </div>
            <div class="quantity-picker">
                <button onclick="changeMenuQty('qty-calpissoda', -1)">-</button>
                <input type="number" id="qty-calpissoda" value="1" min="1" readonly>
                <button onclick="changeMenuQty('qty-calpissoda', 1)">+</button>
                <button class="add-to-cart-btn" onclick="addToCart('可爾必思汽水', 50, 'qty-calpissoda')">加入</button>
            </div>
        </div>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">蘋果咖啡</span>
                <span class="item-price">$70</span>
            </div>
            <div class="quantity-picker">
                <button onclick="changeMenuQty('qty-applecoffee', -1)">-</button>
                <input type="number" id="qty-applecoffee" value="1" min="1" readonly>
                <button onclick="changeMenuQty('qty-applecoffee', 1)">+</button>
                <button class="add-to-cart-btn" onclick="addToCart('蘋果咖啡', 70, 'qty-applecoffee')">加入</button>
            </div>
        </div>
    </div>

    <div class="menu-category">
        <h3>娛樂</h3>
            <div class="menu-item">
                <div class="item-info">
                    <span class="item-name">拍立得</span>
                    <span class="item-price">$100</span>
                </div>
            <div class="quantity-picker">
                <button onclick="changeMenuQty('qty-photo', -1)">-</button>
                <input type="number" id="qty-photo" value="1" min="1" readonly>
                <button onclick="changeMenuQty('qty-photo', 1)">+</button>
                <button class="add-to-cart-btn" onclick="addToCart('拍立得', 100, 'qty-photo')">加入</button>
            </div>
        </div>
    </div>
</div>

<div id="cart-page" style="display:none;" class="container">
    <div class="header">
        <button class="back-link" onclick="showPage('menu-page')">← 繼續點餐</button>
    </div>
    <h2>確認您的訂單</h2>

    <div id="cart-list" class="cart-container"></div>

    <div class="cart-footer">
        <h3>總計: $<span id="total-amount">0</span></h3>
        <button class="checkout-btn" onclick="submitOrder()">確認下單</button>
    </div>
</div>

<div id="success-page" style="display:none;" class="container success-center">
    <div class="success-icon">🎉</div>
    <h2>下單完成！</h2>
    <p>您的取餐單號</p>
    <div id="display-order-number" class="big-number">--</div>
    <button class="home-btn" onclick="location.reload()">回首頁</button>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
